<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2563EB"/>
  <g transform="translate(256, 270)">
    <!-- Dollar sign -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Arial, Helvetica, sans-serif" font-weight="bold"
          font-size="320" fill="white">$</text>
  </g>
  <!-- Upward arrow -->
  <g transform="translate(340, 100)">
    <polyline points="-30,40 0,0 30,40" fill="none" stroke="#34D399" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="0" x2="0" y2="90" stroke="#34D399" stroke-width="24" stroke-linecap="round"/>
  </g>
</svg>
